plugins {
    id 'java'
}

group = 'com.gillodaby'
version = '5.0.0'

tasks.named('jar') {
    archiveBaseName.set('BetterMarkerMap')
}

// Ensure plugin metadata files are included at the root of the plugin JAR.
tasks.named('jar') {
    if (file('plugin.json').exists()) {
        from('plugin.json') { into '' }
    }
    if (file('manifest.json').exists()) {
        from('manifest.json') { into '' }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
    options.compilerArgs += ['-Xlint:deprecation', '-Xlint:unchecked', '-Xlint:removal']
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly files("../libs/HytaleServer.jar")
}

tasks.named('processResources') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from('src/main/resources/Common/UI/WorldMap/MapMarkers') {
        include '*.png'
        into 'Common/UI/Custom/Textures/BetterMarkerMap/MapMarkers'
    }
}
